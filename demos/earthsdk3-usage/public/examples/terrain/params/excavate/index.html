<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <script src="./js/earthsdk.js"></script>
    <!-- иҮӘе®ҡд№үCssж ·ејҸ -->
    <link rel="stylesheet" href="./css/example1.css">
    <title>ең°еҪўжҢ–еқ‘</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="panel">
        <button onclick="resetEdit()">йҮҚж–°з»ҳеҲ¶жҢ–еқ‘</button>
        <button onclick="editingCurrent()">зј–иҫ‘еҪ“еүҚжҢ–еқ‘</button>
    </div>
    <script>
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI0NWNkNmNmNi0xNWMyLTQ3NGYtYjI4Ny01Mjc2ZGE4NGQxNWMiLCJpZCI6Mzg3NTMsImlhdCI6MTYwNjc5NDUwOX0.SIxmCg6USCh-b6mRyuSrWnxqMvUMbVwYrsSVTpi0H0k'
        /** -----------------------------------------ең°зҗғеҲӣе»ә----------------------------------------------------**/
        // Vueдёӯеј•е…Ҙж–№ејҸпјҡimport { ESObjectsManager } from 'earthsdk3';
        const { ESObjectsManager } = window['earthsdk3']
        const { ESCesiumViewer } = window['earthsdk3-cesium']
        const { ESUeViewer } = window['earthsdk3-ue']
        const objm = new ESObjectsManager(ESCesiumViewer, ESUeViewer);
        window.g_objm = objm;
        // зӣ‘еҗ¬и§ҶеҸЈзҠ¶жҖҒ
        objm.viewerCreatedEvent.don((viewer) => {
            viewer.flyIn([115.13608053611286, 28.821215137027473, 4461.014865370932], [309.07544316940016, -33.72351135063601, 0.00009594434830598995], 3)
            //tokenйңҖиҰҒеҲ°cesiumе®ҳзҪ‘з”іиҜ· https://ion.cesium.com/
            // viewer.ionAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI0NWNkNmNmNi0xNWMyLTQ3NGYtYjI4Ny01Mjc2ZGE4NGQxNWMiLCJpZCI6Mzg3NTMsImlhdCI6MTYwNjc5NDUwOX0.SIxmCg6USCh-b6mRyuSrWnxqMvUMbVwYrsSVTpi0H0k'
        });

        // еҲӣе»әCesiumи§ҶеҸЈ
        const viewer = objm.createCesiumViewer(document.getElementById("app"));

        // йҖҡиҝҮjsonеҲӣе»әдёҖдёӘеҪұеғҸеӣҫеұӮ
        const imageryLayer = objm.createSceneObjectFromJson({
            "id": "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
            "type": "ESImageryLayer",
            "maximumLevel": 18,
            "url": "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        });

        /**
         * 1.cesiumе®ҳж–№ең°еҪўйңҖиҰҒеҲ°е®ҳзҪ‘з”іиҜ·token
         * 2.е°Ҷtokenи®ҫзҪ®з»ҷеҪ“еүҚи§ҶеҸЈдёӢзҡ„ionAccessToken
         */
        const sceneObject = objm.createSceneObject('ESTerrainLayer');
        // cesiumе®ҳж–№ең°еҪў
        sceneObject.url = 'ion://1';
        // ејҖеҗҜж·ұеәҰжЈҖжөӢ
        viewer.depthTestAgainstTerrain = true;

        /**-----------------------------ж №жҚ®зұ»пјҲClassпјүеҲӣе»әдёҖдёӘESExcavateжҢ–еқ‘еҜ№иұЎ-------------------------------**/
        const excavateObject = objm.createSceneObject('ESExcavate')
        // жҢ–жҙһеӨҡиҫ№еҪўзӮ№дҪҚ
        excavateObject.points = [
            [
                115.10487284949612,
                28.85008240263011,
                971.971116012139
            ],
            [
                115.09171663736156,
                28.84805117374612,
                1226.3707645627844
            ],
            [
                115.0934405345665,
                28.84068265301527,
                1092.263428089416
            ],
            [
                115.10261675426769,
                28.84261365605999,
                1065.006790359788
            ]
        ]

        // йҮҚж–°з»ҳеҲ¶
        function resetEdit() {
            excavateObject.editing = false
            excavateObject.points = []
            excavateObject.editing = true
        }

        // зј–иҫ‘еҪ“еүҚжҢ–жҙһ
        function editingCurrent() {
            // ејҖеҗҜзј–иҫ‘зҠ¶жҖҒ
            excavateObject.editing = true
        }


    </script>

    <!-- еҲҮжҚўUEе’ҢCesiumеј•ж“Һзҡ„з»„д»¶пјҲVueпјү -->
    <div id="root">
        <switch-engine :objm="objm"></switch-engine>
    </div>
    <!-- Vueж–Үд»¶ -->
    <script src="./js/vue.global.js"></script>
    <!-- еҲҮжҚўUEе’ҢCesiumзҡ„з»„д»¶ -->
    <script src="./js/switchEngineCom.js"></script>
</body>

</html>

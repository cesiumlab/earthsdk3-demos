<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <script src="./js/earthsdk.js"></script>
    <!-- 自定义Css样式 -->
    <link rel="stylesheet" href="./css/example1.css">
    <title>多边形体</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="panel">
        <p>几何体</p>
        <div class="panel-text">
            <span>底部高度</span>
            <input id="heightInput" type="number" min="0" max="500" step="5" value="80"
                oninput="updateHeight(this.value)" />
        </div>
        <div class="panel-text">
            <span>顶部高度</span>
            <input id="extrudedHeightInput" type="number" min="0" max="500" step="5" value="200"
                oninput="updateExtrudedHeight(this.value)" />
        </div>
        <div class="panel-text">
            <span>每个位置高度</span>
            <input id="perPositionHeight" type="checkbox" onchange="togglePerPositionHeight(this.checked)" />
        </div>

        <hr />
        <div class="panel-text">
            <span>线开启</span>
            <input id="strokeEnabled" type="checkbox" checked onchange="toggleStroke(this.checked)" />
        </div>
        <div class="panel-text">
            <span>线颜色</span>
            <input id="strokeColor" type="color" value="#00ffff" onchange="updateStrokeColor(this.value)" />
        </div>
        <div class="panel-text">
            <span>线宽度 (px)</span>
            <input id="strokeWidth" type="number" min="1" max="20" step="1" value="2"
                oninput="updateStrokeWidth(this.value)" />
        </div>

        <hr />

        <div class="panel-text">
            <span>面开启</span>
            <input id="fillEnabled" type="checkbox" checked onchange="toggleFill(this.checked)" />
        </div>
        <div class="panel-text">
            <span>面颜色</span>
            <input id="fillColor" type="color" value="#00ffff" onchange="updateFillColor(this.value)" />
        </div>
        <div class="panel-text">
            <span>贴地</span>
            <input id="fillGround" type="checkbox" checked onchange="toggleFillGround(this.checked)" />
        </div>
    </div>
    <script>
        /** ---------------------------------地球创建------------------------------------**/

        // Vue中引入方式：import { ESObjectsManager } from 'earthsdk3';
        const { ESObjectsManager } = window['EarthSDK3']
        const { ESCesiumViewer } = window['EarthSDK3_Cesium']
        const { ESUeViewer } = window['EarthSDK3_UE']
        const objm = new ESObjectsManager(ESCesiumViewer, ESUeViewer);
        window.g_objm = objm;
        // 监听视口状态
        objm.viewerCreatedEvent.don((viewer) => {
            viewer.flyIn([107.8429854827293, 28.279423322313715, 271.30214726291894], [294.93835404117897, -25.41711873439458, 359.9994345664882], 3)
        });
        // 创建Cesium视口
        const viewer = objm.createCesiumViewer(document.getElementById("app"));
        // 通过json创建一个影像图层
        const imageryLayer = objm.createSceneObjectFromJson({
            "id": "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
            "type": "ESImageryLayer",
            "maximumLevel": 16,
            "url": "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        });

        /** ---------------------------------多边形体------------------------------------**/
        const sceneObject = objm.createSceneObjectFromJson({
            "id": "46b4ee8d-dad5-4eca-9898-edfd8f6aa7e4",
            "type": "ESGeoExtrudedPolygon",
            "name": "ESGeoExtrudedPolygon_a7e4",
            "stroked": true,
            "strokeStyle": {
                "width": 2,
                "widthType": "screen",
                "color": [
                    0,
                    1,
                    1,
                    1
                ],
                "material": "",
                "materialParams": {},
                "ground": false
            },
            "fillStyle": {
                "color": [
                    0,
                    1,
                    1,
                    0.5
                ],
                "material": "",
                "materialParams": {},
                "ground": false
            },
            "points": [
                [
                    107.83757911721322,
                    28.282169541694408,
                    6.005919003790147022
                ],
                [
                    107.83936175492137,
                    28.281724236723147,
                    -0.002095515244224346
                ],
                [
                    107.83814069504204,
                    28.28000052960758,
                    -0.0034821987209029807
                ],
                [
                    107.83647257062093,
                    28.280262508237172,
                    -0.0037578801203005927
                ]
            ],
            "height": 80,//地面高度
            "extrudedHeight": 200,//顶部高度
            "perPositionHeight":false//是否应用每个位置高度
        })

        // 将十六进制颜色转换为 ES 需要的 [r, g, b, a]（0-1）
        function hexToRgbaArray(hex, defaultAlpha) {
            if (typeof hex !== 'string' || !/^#([0-9a-fA-F]{6})$/.test(hex)) {
                return undefined;
            }
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            const a = typeof defaultAlpha === 'number' ? defaultAlpha : 1;
            return [r, g, b, a];
        }

        // 底部高度
        function updateHeight(v) {
            if (!sceneObject) return;
            const num = Number(v);
            if (!isFinite(num)) return;
            sceneObject.height = num;
        }

        // 顶部高度
        function updateExtrudedHeight(v) {
            if (!sceneObject) return;
            const num = Number(v);
            if (!isFinite(num)) return;
            sceneObject.extrudedHeight = num;
        }

        // 每个位置高度
        function togglePerPositionHeight(enabled) {
            if (!sceneObject) return;
            sceneObject.perPositionHeight = !!enabled;
        }

        // 线开启/关闭
        function toggleStroke(enabled) {
            if (!sceneObject) return;
            sceneObject.stroked = !!enabled;
        }

        // 线颜色
        function updateStrokeColor(hex) {
            if (!sceneObject) return;
            const cur = sceneObject.strokeStyle || {};
            const alpha = Array.isArray(cur.color) && typeof cur.color[3] === 'number' ? cur.color[3] : 1;
            const color = hexToRgbaArray(hex, alpha);
            if (!color) return;
            sceneObject.strokeColor = color
        }

        // 线宽度
        function updateStrokeWidth(v) {
            if (!sceneObject) return;
            const num = Number(v);
            if (!isFinite(num)) return;
            sceneObject.strokeWidth = num
        }

        // 面开启/关闭
        function toggleFill(enabled) {
            if (!sceneObject) return;
            // 一些对象支持 filled 属性
            sceneObject.filled = !!enabled;

        }

        // 面颜色
        function updateFillColor(hex) {
            if (!sceneObject) return;
            const cur = sceneObject.fillStyle || {};
            const alpha = Array.isArray(cur.color) && typeof cur.color[3] === 'number' ? cur.color[3] : 0.5;
            const color = hexToRgbaArray(hex, alpha);
            if (!color) return;
            sceneObject.fillColor = color
        }

        // 面贴地
        function toggleFillGround(enabled) {
            if (!sceneObject) return;
            // 部分对象还支持 fillGround 简写
            sceneObject.fillGround = !!enabled;
        }
    </script>

    <!-- 切换UE和Cesium引擎的组件（Vue） -->
    <div id="root">
        <switch-engine :objm="objm"></switch-engine>
    </div>
    <!-- Vue文件 -->
    <script src="./js/vue.global.js"></script>
    <!-- 切换UE和Cesium的组件 -->
    <script src="./js/switchEngineCom.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <script src="./js/earthsdk.js"></script>
    <!-- 自定义Css样式 -->
    <link rel="stylesheet" href="./css/example1.css">
    <title>根据类（Class）创建对象</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script>

        /** -----------------------------------------地球创建----------------------------------------------------**/
        // Vue中引入方式：import { ESObjectsManager } from 'earthsdk3';
        const { ESObjectsManager } = window['earthsdk3']
        const { ESCesiumViewer } = window['earthsdk3-cesium']
        const { ESUeViewer } = window['earthsdk3-ue']

        const objm = new ESObjectsManager(ESCesiumViewer, ESUeViewer);
        window.g_objm = objm;

        // 创建Cesium视口
        const viewer = objm.createCesiumViewer({
            type: 'ESCesiumViewer',
            container: document.getElementById("app"),
        });
        // 监听视口创建
        objm.viewerCreatedEvent.don(v => {
            viewer.flyIn([116.40652135457904, 39.895916046805326, 943.015822904817], [346.3720690214717, -42.33771356206233, 0.0014172887026429263], 3)
        })
        // 通过json创建一个影像图层
        const imageryLayer = objm.createSceneObjectFromJson({
            "id": "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
            "type": "ESImageryLayer",
            "maximumLevel": 18,
            "url": "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        });


        /**-------------------------------------根据类（Class）创建一个Alarm对象-------------------------------**/

        // Vue中引入方式：import { ESAlarm } from 'earthsdk3';
        const { ESAlarm } = window['earthsdk3']
        const sceneObject = objm.createSceneObject(ESAlarm)
        sceneObject.position = [116.404, 39.904, 0]
        sceneObject.radius = 200


    </script>

    <!-- 切换UE和Cesium引擎的组件（Vue） -->
    <div id="root">
        <switch-engine :objm="objm"></switch-engine>
    </div>
    <!-- Vue文件 -->
    <script src="./js/vue.global.js"></script>
    <!-- 切换UE和Cesium的组件 -->
    <script src="./js/switchEngineCom.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <script src="./js/earthsdk.js"></script>
    <!-- 自定义Css样式 -->
    <link rel="stylesheet" href="./css/example1.css" />

    <title>feature区间条件着色</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="panel">
        <button onclick="setFeatureColor()">样式着色</button>
        <button onclick="resetFeatureStyle()">恢复原始</button>
    </div>

    </div>
    <script>
        /** ---------------------------------地球创建------------------------------------**/

        // Vue中引入方式：import { ESObjectsManager } from 'esobjs-xe2-plugin/dist-node/esobjs-xe2-plugin-main';

        const { ESObjectsManager, ES3DTileset } = XE2["esobjs-xe2-plugin-main"];

        const { PickedInfo } = XE2["xe2-base-objects"];
        const objm = new ESObjectsManager();
        window.g_objm = objm;

        // 创建Cesium视口
        const viewer = objm.createCesiumViewer({
            domid: document.getElementById("app"),
        });
        // 监听视口状态
        viewer.statusChanged.don((status) => {
            if (status == "Created") {
                viewer.flyIn(
                    [116.35581215034496, 39.987711009589205, 80.13207081218997],
                    [320.3370729250185, -29.355927531043786, 0.00013982187478451367],
                    3
                );
            }
        });

        // 通过json创建一个影像图层
        const imageryLayer = objm.createSceneObjectFromJson({
            id: "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
            type: "ESImageryLayer",
            maximumLevel: 18,
            url: "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        });

        // 创建ES3DTileset对象
        const es3DTileset = objm.createSceneObject(ES3DTileset);
        // url服务地址
        es3DTileset.url = "https://www.pipeser.com/3dtiles/phipxrow1/tileset.json";
        es3DTileset.tilesetReady.don((tileset) => {
            setFeatureColor()
        })

        // 区间设置颜色
        function setFeatureColor() {
            // 恢复默认样式
            es3DTileset.resetFeatureStyle();
            // 设置着色【区间设置需要类型为（数值类型number）】
            es3DTileset.setFeatureColor(
                "iid",
                [
                    {
                        minValue: 3054,
                        maxValue: 3300,
                        rgba: [1, 0, 0, 1],
                    },
                    {
                        minValue: 3300,
                        maxValue: 3600,
                        rgba: [1, 1, 0, 1],
                    },
                ]
            );
        }

        // 恢复原始
        function resetFeatureStyle() {
            es3DTileset.resetFeatureStyle();
        }


    </script>

    <!-- 切换UE和Cesium引擎的组件（Vue） -->
    <div id="root">
        <switch-engine :objm="objm"></switch-engine>
    </div>
    <!-- Vue文件 -->
    <script src="./js/vue.global.js"></script>
    <!-- 切换UE和Cesium的组件 -->
    <script src="./js/switchEngineCom.js"></script>
</body>

</html>

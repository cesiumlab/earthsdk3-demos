<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <script src="./js/earthsdk.js"></script>
    <!-- 面板的样式放到css文件内 -->
    <link rel="stylesheet" href="./css/example1.css">
    <title>Cesium地球初始化</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
        }


        .toggle-switch {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="panel">
        <div class="toggle-switch">
            <h4>对象跟随模式</h4>
            <label class="switch">
                <input type="checkbox" id="mySwitch" onclick="toggleSwitch()">
                <span class="slider"></span>
            </label>
        </div>
    </div>
    <script>

        // Vue中引入方式：import { ESObjectsManager } from 'earthsdk3';
        const { ESObjectsManager } = window['earthsdk3']
        const { ESCesiumViewer } = window['earthsdk3-cesium']
        const { ESUeViewer } = window['earthsdk3-ue']

        const objm = new ESObjectsManager(ESCesiumViewer, ESUeViewer);
        window.g_objm = objm;


        // 监听视口创建完成事件
        objm.viewerCreatedEvent.don((viewer) => {
            // 飞到某个视角下
            viewer.flyIn([
                109.60641642092877,
                18.58672999712112,
                21.06720560062831], [
                80.30243945851852,
                -20.670220938586485,
                0.00004228996594215643], 3)
        })

        // 创建Cesium视口
        const viewer = objm.createCesiumViewer({
            type: 'ESCesiumViewer',
            container: document.getElementById("app"),
        });
        // viewer.ionAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIyZmQzMDI1OC1kMWYyLTQ1ZjEtYTJmNS0yMjY1ZDcxZjEyOTkiLCJpZCI6NjQ3MTgsImlhdCI6MTYyOTQzNDM5M30.m8vkzG05QiAfe6JQ0XPK8z_6KuUVMf_CoSY-YlMnAIg"

        // 通过json创建对象
        const objList = [
            {
                "id": "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
                "type": "ESImageryLayer",
                "maximumLevel": 18,
                "url": "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
            },
            {
                "id": "ESHuman_id",// 对象Id
                "ref": "ESHuman_obj",
                "type": "ESHuman",
                "position": [
                    109.60681752569195,
                    18.58679192126289,
                    0.5
                ],
                "rotation": [
                    -8.135989761566222,
                    0,
                    0
                ],
                "name": "工人1",
                "animation": "walking"
            },
            {
                "id": "bbce8c58-f45e-4365-858f-624f9595a761",
                "type": "ESImageLabel",
                "position": [
                    109.6074882,
                    18.5868828,
                    0.5
                ],
                "rotation": [
                    -90,
                    0,
                    0
                ],
                "name": "蓝色相机1",
                "renderMode": 4
            }
        ]

        objList.forEach(obj => {
            objm.createSceneObjectFromJson(obj)
        })


        // switch切换
        function toggleSwitch() {
            let switchValue = document.getElementById("mySwitch").checked;
            if (switchValue) {
                // changeToFollow(objectId: string, distance ?: number, heading ?: number, pitch ?: number, changeToFollow ?: boolean)
                // 开启
                objm.activeViewer.changeToFollow('ESHuman_id', 20)//Id来自objList

                //人物移动
                objm.$refs.ESHuman_obj.smoothMove([109.6074882, 18.5868828, 0.5], 20);
            } else {
                // 关闭
                objm.activeViewer.changeToMap();
                //回到原位
                objm.$refs.ESHuman_obj.smoothMove([109.60681752569195, 18.58679192126289, 0.5], 0);
            }
        }
        toggleSwitch();

    </script>
    <!-- 切换UE和Cesium引擎的组件（Vue） -->
    <div id="root">
        <switch-engine :objm="objm"></switch-engine>
    </div>
    <!-- Vue文件 -->
    <script src="./js/vue.global.js"></script>
    <!-- 切换UE和Cesium的组件 -->
    <script src="./js/switchEngineCom.js"></script>
</body>

</html>

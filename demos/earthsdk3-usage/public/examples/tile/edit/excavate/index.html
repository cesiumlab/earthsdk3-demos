<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <script src="./js/earthsdk.js"></script>
    <!-- 自定义Css样式 -->
    <link rel="stylesheet" href="./css/example1.css" />
    <title>加载3dtileset</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0px;
        padding: 0px;
      }

      .box {
        display: grid;
        grid-template-columns: 60px 1fr;
        align-items: center;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <div id="panel">
      <button id="excavate1" onclick="setExcavate('1')">挖坑1隐藏</button>
      <button id="excavate2" onclick="setExcavate('2')">挖坑2隐藏</button>
    </div>
    <script>
      /** -----------------------------------------地球创建----------------------------------------------------**/

      // Vue中引入方式：import { ESObjectsManager } from 'earthsdk3';
      const { ESObjectsManager } = window["EarthSDK3"];
      const { ESCesiumViewer } = window["EarthSDK3_Cesium"];
      const { ESUeViewer } = window["EarthSDK3_UE"];
      const objm = new ESObjectsManager(ESCesiumViewer, ESUeViewer);
      window.g_objm = objm;
      // 监听视口状态
      objm.viewerCreatedEvent.don((viewer) => {
        viewer.flyIn(
          [108.9635372579075, 34.215765456049205, 809.1519880309244],
          [315.79945310620036, -35.668819584682595, 0.0004962989500816943],
          3
        );
      });
      // 创建Cesium视口
      const viewer = objm.createCesiumViewer(document.getElementById("app"));

      // 通过json创建一个影像图层
      const imageryLayer = objm.createSceneObjectFromJson({
        id: "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
        type: "ESImageryLayer",
        maximumLevel: 16,
        url: "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      });

      /**-----------------------------根据类（Class）创建一个ES3DTileset对象-------------------------------**/
      const { ES3DTileset } = window["EarthSDK3"];
      const sceneObject = objm.createSceneObject(ES3DTileset);
      sceneObject.url =
        "https://www.earthsdk.com/assets/tileset/osgb_dayanta/tileset.json";

      let excavate1 = undefined;
      let excavate2 = undefined;

      // 对象加载完成
      sceneObject.tilesetReady.don(() => {
        /**-----------------------------设置3dtileset挖坑对象1-------------------------------**/
        excavate1 = objm.createSceneObjectFromJson({
          id: "636487fd-098a-4dbc-9e3c-1eb672ca1218",
          type: "ESExcavate",
          name: "挖坑1",
          points: [
            [108.95854401978644, 34.2186892620696, 424.35926129753807],
            [108.9598018292231, 34.2191415828112, 433.55642530445294],
            [108.95987800756092, 34.218023670603735, 419.2593190185091],
          ],
          targetID: sceneObject.id,
        });

        /**-----------------------------设置3dtileset挖坑对象2-------------------------------**/

        excavate2 = objm.createSceneObjectFromJson({
          id: "96c89fd-7e7f-44a5-9402-b150fbf29d2f",
          type: "ESExcavate",
          name: "挖坑2",
          points: [
            [108.95977992933524, 34.22009464630667, 424.2107661746365],
            [108.95976711551182, 34.21954286674607, 425.6436380073075],
            [108.9591085569588, 34.21955048230229, 425.1619252184558],
            [108.95911111455814, 34.220113596135164, 423.7443639894318],
          ],
          targetID: sceneObject.id,
        });
      });

      const setExcavate = (type) => {
        switch (type) {
          case "1":
            excavate1.show = !excavate1.show;
            document.getElementById("excavate1").innerHTML = excavate1.show
              ? "挖坑1隐藏"
              : "挖坑1显示";
            break;
          case "2":
            excavate2.show = !excavate2.show;
            document.getElementById("excavate2").innerHTML = excavate1.show
              ? "挖坑2隐藏"
              : "挖坑2显示";
            break;
          default:
            break;
        }
      };

      /**-----------------------------创建围栏边界-------------------------------**/
      const fence1 = objm.createSceneObjectFromJson({
        id: "3ec0eb30-6260-476b-be55-6f45a159d204",
        type: "ESPolygonFence",
        name: "电子围栏7-1",
        height: 30,
        fillStyle: {
          color: [
            0.011764705882352941, 0.9882352941176471, 0.9411764705882353, 1,
          ],
          material: "",
          materialParams: {},
          ground: false,
        },
        points: [
          [108.95854401978644, 34.2186892620696, 424.35926129753807],
          [108.9598018292231, 34.2191415828112, 433.55642530445294],
          [108.95987800756092, 34.218023670603735, 419.2593190185091],
        ],
        materialMode: "gradientColor",
      });

      const fence2 = objm.createSceneObjectFromJson({
        id: "30-6260-476b-be55-6f45a159d204",
        type: "ESPolygonFence",
        name: "电子围栏7-2",
        height: 30,
        fillStyle: {
          color: [
            0.011764705882352941, 0.9882352941176471, 0.9411764705882353, 1,
          ],
          material: "",
          materialParams: {},
          ground: false,
        },
        points: [
          [108.95977992933524, 34.22009464630667, 424.2107661746365],
          [108.95976711551182, 34.21954286674607, 425.6436380073075],
          [108.9591085569588, 34.21955048230229, 425.1619252184558],
          [108.95911111455814, 34.220113596135164, 423.7443639894318],
        ],
        materialMode: "gradientColor",
      });
    </script>

    <!-- 切换UE和Cesium引擎的组件（Vue） -->
    <div id="root">
      <switch-engine :objm="objm"></switch-engine>
    </div>
    <!-- Vue文件 -->
    <script src="./js/vue.global.js"></script>
    <!-- 切换UE和Cesium的组件 -->
    <script src="./js/switchEngineCom.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <script src="./js/earthsdk.js"></script>
    <!-- 自定义Css样式 -->
    <link rel="stylesheet" href="./css/example1.css">
    <title>Cesium地球初始化</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
        }

        .box {
            display: grid;
            grid-template-columns: 100px 1fr;
            margin-bottom: 10px;
            align-items: center;
        }

        /* 开关组件样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #2196F3;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="panel">
        <div class="box">
            <label for=""> 编辑</label>
            <label class="switch">
                <input type="checkbox" id="editing" onchange="editing()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="box">
            <label for="">显示锥体</label>
            <label class="switch">
                <input type="checkbox" checked id="showFrustum" onchange="showFrustum()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="box">
            <label for=""> 视频路径</label> <input type="text" id="vedioPath" onchange="vedioPath()"
                value="https://www.earthsdk.com/assets/video/5.mp4">
        </div>
        <div class="box">
            <label for=""> 视域夹角</label> <input type="text" id="fov" value="50" onchange="fov()">
        </div>
        <div class="box">
            <label for=""> 显示优先级</label> <input type="text" id="zindex" value="1" onchange="zindex()">
        </div>
        <div class="box">
            <label for=""> 纵横比</label> <input type="text" id="aspectRatio" value="2.8" onchange="aspectRatio()">
        </div>
        <div class="box">
            <label for=""> 远裁剪面</label> <input type="text" id="far" value="33.207249253992195" onchange="far()">
        </div>
        <div class="box">
            <label for=""> 近裁剪面</label> <input type="text" id="near" value="2" onchange="near()">
        </div>
    </div>
    <script>
        /** ---------------------------------地球创建------------------------------------**/
        // Vue中引入方式：import { ESObjectsManager } from 'earthsdk3';
        const { ESObjectsManager } = window['EarthSDK3']
        const { ESCesiumViewer } = window['EarthSDK3_Cesium']
        const { ESUeViewer } = window['EarthSDK3_UE']
        const objm = new ESObjectsManager(ESCesiumViewer, ESUeViewer);
        window.g_objm = objm;
        // 监听视口状态
        objm.viewerCreatedEvent.don((viewer) => {
            viewer.flyIn(
                [
                    112.51305434182885,
                    -0.0003386800140887289,
                    7.556173583841076
                ], [
                358.4093644771097,
                -4.729880846007337,
                359.9999770264854
            ], 3
            )
        });
        // 创建Cesium视口
        const viewer = objm.createCesiumViewer(document.getElementById("app"));

        // 通过json创建一个影像图层
        const imageryLayer = objm.createSceneObjectFromJson({
            "id": "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
            "type": "ESImageryLayer",
            "maximumLevel": 16,
            "url": "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        });


        /** ---------------------------------------视频融合------------------------------------------**/
        /**
         * 视频融合
         * 在ue中视频融合可以投到瓦片和地形上
         * 在cesium中视频融合可以投到瓦片上
         * 
        */
        //添加瓦片用来投放视频
        const ES3DTileset = objm.createSceneObjectFromJson({
            "id": "c2c8311e-6e50-47a2-b764-1c82f2d0e256",
            "type": "ES3DTileset",
            "name": "广场",
            "allowPicking": true,
            "offset": [
                0,
                0,
                2.4552151614017994
            ],
            "url": "https://www.earthsdk.com/assets/tileset/longqi/tileset.json"
        })

        // 创建一个视频融合对象
        const sceneObject = objm.createSceneObjectFromJson({
            "type": "ESVideoFusion",
            "position": [
                112.51304009959738,
                -0.000009467818977038337,
                2.4369646184160096
            ],
            "rotation": [
                -90.38410044738212,
                8.181277597229016,
                0
            ],
            "fov": 50,
            "aspectRatio": 2.8,
            "far": 33.207249253992195,
            "near": 2,
            "videoStreamUrl": "https://www.earthsdk.com/assets/video/5.mp4"
        })
        // 编辑对象
        function editing() {
            sceneObject.editing = !sceneObject.editing
            if (sceneObject.editing) {
                alert("按下空格开始三脚架编辑")
            }

        }
        /**
       * 监听对象的编辑状态，改变checkbox的状态
       * 用法 对象名.属性名+Changed.don((val)=>{})
       * don是disposableOn的简写形式，用来监听事件，相当于Vue中的watch用途，都是监听属性事件的变化
       */
        sceneObject.editingChanged.don((val) => {
            document.getElementById('editing').checked = val
        })

        sceneObject.showFrustumChanged.don((val) => {
            document.getElementById('showFrustum').checked = val
        })

        // 视频播放地址
        function vedioPath() {
            sceneObject.videoStreamUrl = document.getElementById("vedioPath").value
        }

        /**
         * 视域夹角
         * 属性值范围为0-180，不为0或180。
         * */
        function fov() {
            sceneObject.fov = document.getElementById("fov").value
        }

        // 显示优先级
        function zindex() {
            sceneObject.zIndex = document.getElementById("zindex").value
        }

        // 是否显示锥体
        function showFrustum() {
            sceneObject.showFrustum = !sceneObject.showFrustum
        }

        // 纵横比
        function aspectRatio() {
            sceneObject.aspectRatio = parseFloat(document.getElementById("aspectRatio").value)
        }

        // 远裁剪面
        function far() {
            sceneObject.far = parseFloat(document.getElementById("far").value)
        }

        // 近裁剪面
        function near() {
            sceneObject.near = parseFloat(document.getElementById("near").value)
        }

    </script>

    <!-- 切换UE和Cesium引擎的组件（Vue） -->
    <div id="root">
        <switch-engine :objm="objm"></switch-engine>
    </div>
    <!-- Vue文件 -->
    <script src="./js/vue.global.js"></script>
    <!-- 切换UE和Cesium的组件 -->
    <script src="./js/switchEngineCom.js"></script>
</body>

</html>

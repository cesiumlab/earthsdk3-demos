<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <script src="./js/earthsdk.js"></script>
    <!-- 自定义Css样式 -->
    <link rel="stylesheet" href="./css/example1.css">
    <title>加载3dtileset</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
        }

        .box {
            display: grid;
            grid-template-columns: 60px 1fr;
            align-items: center;
            margin: 10px 0 10px 0;
        }

        em {
            color: yellow;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="panel">
        <em>此功能目前仅支持Cesium</em>

        <div class="box">
            <label for="">样式</label><select name="style" id="style" onchange="toggleStyle()">
                <option value="">默认样式</option>
                <option value="vec4(1,0,0,1)">纯色</option>
            </select>
        </div>

        <div>
            <a href="https://github.com/CesiumGS/3d-tiles/tree/main/specification/Styling" target="_blank">style语言说明</a>
        </div>
    </div>
    <script>

        /** -----------------------------------------地球创建----------------------------------------------------**/


        // Vue中引入方式：import { ESObjectsManager } from 'earthsdk3';
        const { ESObjectsManager } = window['EarthSDK3']
        const { ESCesiumViewer } = window['EarthSDK3_Cesium']
        const { ESUeViewer } = window['EarthSDK3_UE']
        const objm = new ESObjectsManager(ESCesiumViewer, ESUeViewer);
        window.g_objm = objm;
        // 创建Cesium视口
        const viewer = objm.createCesiumViewer(document.getElementById("app"));
        viewer.ionAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIyZmQzMDI1OC1kMWYyLTQ1ZjEtYTJmNS0yMjY1ZDcxZjEyOTkiLCJpZCI6NjQ3MTgsImlhdCI6MTYyOTQzNDM5M30.m8vkzG05QiAfe6JQ0XPK8z_6KuUVMf_CoSY-YlMnAIg"

        // 通过json创建一个影像图层
        const imageryLayer = objm.createSceneObjectFromJson({
            "id": "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
            "type": "ESImageryLayer",
            "maximumLevel": 16,
            "url": "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        });


        /**-----------------------------创建一个ES3DTileset对象-------------------------------**/
        const { ES3DTileset } = window['EarthSDK3']
        const sceneObject = objm.createSceneObject(ES3DTileset)
        sceneObject.url = "https://www.earthsdk.com/assets/tileset/osgb_dayanta/tileset.json"

        sceneObject.tilesetReady.don(() => {
            sceneObject.flyTo()
        })

        /**-----------------------------3dtileset样式-------------------------------**/
        function toggleStyle() {
            sceneObject.czmStyleJson = {
                "color": document.getElementById("style").value
            }
        }

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <script src="./js/earthsdk.js"></script>
    <script src="./js/Colorpicker.js"></script>
    <!-- 自定义Css样式 -->
    <link rel="stylesheet" href="./css/example1.css" />
    <title>地理水面</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
        }

        .box1,
        .box2,
        .box {
            display: grid;
            grid-template-columns: 110px 1fr;
            align-items: center;
        }

        .box label,
        .box1 label,
        .box2 label {
            padding-right: 10px;
        }

        .btn {
            padding-top: 10px;
        }

        .btn button {
            width: 286px;
        }

        label {
            line-height: 40px;
        }

        .warning {
            color: #fff;
            font-size: 14px;
        }

        .warning .warningText {
            color: sandybrown;
        }

        #GroupColor {
            background-color: rgb(78, 82, 28);
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="panel">
        <div class="box">
            <label for="">水域类型</label>
            <select name="mode" id="type" onchange="setType()">
                <option value="custom">custom</option>
                <option value="river">river</option>
                <option value="ocean">ocean</option>
                <option value="lake">lake</option>
            </select>
        </div>
        <p class="warning">
            <span class="warningText">提示：</span>下述参数只有类型为custom时生效
        </p>
        <div class="box1">
            <label for="">水的底色</label>
            <div class="colorBox">
                <input id="waterColor" value="#4e521c" />
                <div id="GroupColor"></div>
            </div>
            <label for="">频率</label>
            <input id="frequency" type="number" value="1000" oninput="setFrequency()" />
            <label for="">波动频率</label>
            <div class="rangeBox">
                <input id="waveVelocity" type="range" value="0.5" step="0.01" min="0" max="1"
                    oninput="setWaveVelocity()" />
                <div class="rangeNum" id="rangeWaveVelocity">0.5</div>
            </div>
            <label for="">振幅</label>
            <div class="rangeBox">
                <input id="amplitude" type="range" value="0.1" step="0.01" min="0" max="1" oninput="setAmplitude()" />
                <div class="rangeNum" id="rangeAmplitude">0.1</div>
            </div>
            <label for="">镜面反射强度</label>
            <div class="rangeBox">
                <input id="specularIntensity" type="range" value="0.8" step="0.01" min="0" max="1"
                    oninput="setSpecularIntensity()" />
                <div class="rangeNum" id="rangeSpecularIntensity">0.8</div>
            </div>
        </div>
        <p class="warning">
            <span class="warningText">提示：</span>下述参数仅UE有效
        </p>

        <div class="box2">
            <label for="">流向</label>
            <div class="rangeBox">
                <input id="flowDirection" type="range" value="0" step="1" min="0" max="360"
                    oninput="setFlowDirection()" />
                <div class="rangeNum" id="rangeFlowDirection">0</div>
            </div>
            <label for="">水流速度</label>
            <input id="flowSpeed" type="number" value="0" oninput="setFlowSpeed()" />
        </div>
        <div class="btn">
            <button onclick="resetPlane()">重新绘制</button>
            <button onclick="editPlane()">编辑</button>
        </div>
    </div>
    <script>
        /** ---------------------------------地球创建------------------------------------**/

        // Vue中引入方式：import { ESObjectsManager } from 'earthsdk3';
        const { ESObjectsManager } = window['EarthSDK3']
        const { ESCesiumViewer } = window['EarthSDK3_Cesium']
        const { ESUeViewer } = window['EarthSDK3_UE']
        const objm = new ESObjectsManager(ESCesiumViewer, ESUeViewer);
        window.g_objm = objm;
        // 监听视口状态
        objm.viewerCreatedEvent.don((viewer) => {
            viewer.flyIn(
                [117.2438081621899, 39.23358908644419, 2650.624135682927],
                [43.09820515903513, -41.82447107614425, 0.003435021103636539],
                3)
        });
        // 创建Cesium视口
        const viewer = objm.createCesiumViewer(document.getElementById("app"));

        // 通过json创建一个影像图层
        const imageryLayer = objm.createSceneObjectFromJson({
            id: "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
            type: "ESImageryLayer",
            url: "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        });

        /** ---------------------------------地理水面------------------------------------**/

        const eSGeoWater = objm.createSceneObject('ESGeoWater');
        window.eSGeoWater = eSGeoWater;

        // 初始赋值
        const init1 = () => {
            eSGeoWater.waterColor = [0.1497, 0.165, 0.0031, 1];
            eSGeoWater.frequency = 1000;
            eSGeoWater.waveVelocity = 0.5;
            eSGeoWater.amplitude = 0.1;
            eSGeoWater.specularIntensity = 0.8;
            eSGeoWater.waterType = "custom";
            eSGeoWater.flowDirection = 0;
            eSGeoWater.flowSpeed = 0;
            eSGeoWater.points = [
                [117.25922349284644, 39.25999979475598, 1],
                [117.265538396172, 39.25496180903497, 1],
                [117.28041443025957, 39.248155578468264, 1],
                [117.27817821031633, 39.244881558064684, 1],
                [117.2693402773475, 39.2425052251558, 1],
                [117.26038013943756, 39.24796657952863, 1],
                [117.25566772299705, 39.25924247582261, 1],
                [117.25759071775315, 39.259731495662756, 1],
            ];
        };
        init1();

        const dom = {
            // 水域类型
            type: document.getElementById("type"),
            // 水的底色
            waterColor: document.getElementById("waterColor"),
            // 频率
            frequency: document.getElementById("frequency"),
            // 波动频率
            waveVelocity: document.getElementById("waveVelocity"),
            // 振幅
            amplitude: document.getElementById("amplitude"),
            // 镜面反射强度
            specularIntensity: document.getElementById("specularIntensity"),
            // 流向
            flowDirection: document.getElementById("flowDirection"),
            // 水流速度
            flowSpeed: document.getElementById("flowSpeed"),
        };

        // 设置水域类型
        function setType() {
            console.log("dom.type.value", dom.type.value);
            eSGeoWater.waterType = dom.type.value;
            if (eSGeoWater.waterType !== "custom") {
                for (let key in dom) {
                    if (key == "type") continue;
                    dom[key].disabled = true;
                    dom[key].style.cursor = "no-drop";
                }
            } else {
                for (let key in dom) {
                    if (key == "type") continue;
                    dom[key].disabled = false;
                    dom[key].style.cursor = "unset";
                }
            }
        }
        setType();

        // 频率
        function setFrequency() {
            eSGeoWater.frequency = Number(dom.frequency.value);
        }

        // 波动频率
        function setWaveVelocity() {
            let value = Number(dom.waveVelocity.value);
            document.getElementById("rangeWaveVelocity").innerHTML = value;
            eSGeoWater.waveVelocity = value;
        }

        // 振幅
        function setAmplitude() {
            let value = Number(dom.amplitude.value);
            document.getElementById("rangeAmplitude").innerHTML = value;
            eSGeoWater.amplitude = value;
        }

        // 镜面反射强度
        function setSpecularIntensity() {
            let value = Number(dom.specularIntensity.value);
            document.getElementById("rangeSpecularIntensity").innerHTML = value;
            eSGeoWater.specularIntensity = value;
        }

        // 流向
        function setFlowDirection() {
            let value = Number(dom.flowDirection.value);
            document.getElementById("rangeFlowDirection").innerHTML = value;
            eSGeoWater.flowDirection = value;
        }

        // 水流速度
        function setFlowSpeed() {
            eSGeoWater.flowSpeed = Number(dom.flowSpeed.value);
        }

        // 重新绘制
        function resetPlane() {
            eSGeoWater.editing = false;

            eSGeoWater.points = [];
            eSGeoWater.editing = true;
        }

        // 编辑
        function editPlane() {
            eSGeoWater.editing = true;
        }

        // 取色
        Colorpicker.create({
            el: "GroupColor",
            // color:"rgb(26,68,120)",
            initColor: "rgb(78,82,28)",

            change: function (elem, hex) {
                elem.style.backgroundColor = hex;
                // 最后颜色获取赋值部分，其中hex为用户选中后颜色
                dom.waterColor.value = hex;
                const cssColor = hexToRgb(hex);
                const xe2Color = cssColorToXe2Color(cssColor);

                eSGeoWater.waterColor = [...xe2Color, 1];
            },
        });
    </script>

    <!-- 切换UE和Cesium引擎的组件（Vue） -->
    <div id="root">
        <switch-engine :objm="objm"></switch-engine>
    </div>
    <!-- Vue文件 -->
    <script src="./js/vue.global.js"></script>
    <!-- 切换UE和Cesium的组件 -->
    <script src="./js/switchEngineCom.js"></script>
</body>

</html>

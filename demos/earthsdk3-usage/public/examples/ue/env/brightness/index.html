<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <script src="./js/earthsdk.js"></script>
    <script src="./js/Colorpicker.js"></script>
    <!-- 自定义Css样式 -->
    <link rel="stylesheet" href="./css/example1.css" />
    <title>场景亮度</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
        }

        .box {
            display: grid;
            grid-template-columns: 110px 1fr;
            align-items: center;
        }

        .box label {
            padding-right: 10px;
        }

        .btn {
            padding-top: 10px;
        }

        .btn button {
            width: 286px;
        }

        label {
            line-height: 40px;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="panel">
        <div class="box">
            <label for="">场景亮度</label>
            <div class="rangeBox">
                <input id="luminance" type="range" value="1" step="0.1" min="-10" max="10" oninput="setBrightness()" />
                <div class="rangeNum" id="rangeNum2">1</div>
            </div>
        </div>
        <div class="btn">
            <button onclick="reset()">恢复初始值</button>
        </div>
    </div>
    <script>
        /** ---------------------------------地球创建------------------------------------**/

        // Vue中引入方式：import { ESObjectsManager } from 'esobjs-xe2-plugin/dist-node/esobjs-xe2-plugin-main';

        const { ESObjectsManager } = XE2["esobjs-xe2-plugin-main"];
        const objm = new ESObjectsManager();
        window.g_objm = objm;

        // 视口创建完成事件
        objm.viewerCreatedEvent.don((viewer) => {
            // 通过json创建一个影像图层
            const imageryLayer = objm.createSceneObjectFromJson({
                id: "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
                type: "ESImageryLayer",
                url: "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            });
            viewer.flyIn([117.25365307720762, 39.24754097885942, 50.42422471843499], [43.09804153442383, -41.825035095214844, -0.00013615637726616114], 3);
        })



        /** ---------------------------------场景亮度------------------------------------**/

        const { ESAlarm } = XE2["esobjs-xe2-plugin-main"];
        const eSAlarm = objm.createSceneObject(ESAlarm);

        eSAlarm.position = [
            117.25409443533076, 39.247911456953126, 0.0000011967829376834512,
        ];

        //   设置亮度
        const setBrightness = () => {

            let value = Number(document.querySelector("#luminance").value)
            document.querySelector("#rangeNum2").innerHTML = value
            objm.activeViewer.brightness = value
        };

        //   恢复初始值
        const reset = () => {
            document.querySelector("#luminance").value = 1
            document.querySelector("#rangeNum2").innerHTML = 1;
            objm.activeViewer.brightness = 1;
        };
    </script>

    <!-- UE引擎面板组件 -->
    <div id="root">
        <create-ue-engine :objm="objm"></create-ue-engine>
    </div>
    <!-- Vue文件 -->
    <script src="./js/vue.global.js"></script>
    <!-- 切换UE和Cesium的组件 -->
    <script src="./js/createUeEngine.js"></script>
</body>

</html>

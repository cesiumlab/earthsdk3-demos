<!DOCTYPE html>
<html lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>earthsdk3</title>
    <style>
        html,
        body,
        #container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
    </style>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.123/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.123/Build/Cesium/Cesium.js"></script>
    <script src="../../node_modules/xbsj-base/dist/xbsj-base.js"></script>
    <script src="../../node_modules/earthsdk3-assets/earthsdk3-assets.js"></script>
    <script src="../../node_modules/earthsdk3/dist/earthsdk3.iife.js"></script>
    <script src="../../node_modules/earthsdk3-cesium/dist/earthsdk3-cesium.iife.js"></script>
    <script src="../../node_modules/earthsdk3-ue/dist//earthsdk3-ue.iife.js"></script>
</head>

<body>
    <div id="container" style="width: 100%; height: 100%;"></div>
    <script defer="defer">
        const { ESObjectsManager } = window['EarthSDK3'];
        const { ESCesiumViewer } = window['EarthSDK3_Cesium'];
        const { ESUeViewer } = window['EarthSDK3_UE'];
        const objm = new ESObjectsManager(ESCesiumViewer, ESUeViewer);
        console.log(objm);
        const option = {
            type: "ESCesiumViewer",
            container: 'container'
        }
        const viewer = objm.createViewer(option);

        objm.createSceneObjectFromJson({
            "id": "ae103185-08c7-4ed0-b6d4-15ad77bbbf66",
            "type": "ESImageryLayer",
            "url": "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            "maximumLevel": 18,
            "name": "全球影像",
            "allowPicking": true
        })
    </script>
</body>

</html>

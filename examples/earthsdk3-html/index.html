<!DOCTYPE html>
<html lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>earthsdk3</title>
    <style>
        html,
        body,
        #container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
    </style>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.123/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.123/Build/Cesium/Cesium.js"></script>
    <script>
        window.cesium = Cesium;
    </script>
    <script src="js/xbsj-base/dist/xbsj-base.js"></script>
    <script src="js/earthsdk3-assets/dist-web/earthsdk3-assets.js"></script>
    <script src="js/earthsdk3/dist/earthsdk3.js"></script>
    <script src="js/earthsdk3-cesium/dist/earthsdk3-cesium.js"></script>
    <script src="js/earthsdk3-ue/dist/earthsdk3-ue.js"></script>
    <script src="js/earthsdk3-ol/dist/earthsdk3-ol.js"></script>
</head>

<body>
    <div id="container" style="width: 100%; height: 100%;"></div>
    <script defer="defer">
        const { Event } = window['xbsj-base'];
        const { ESObjectsManager } = earthsdk3;
        const { ESCesiumViewer } = window['earthsdk3-cesium'];
        const { ESUeViewer } = window['earthsdk3-ue'];
        const { ESOlViewer } = window['earthsdk3-ol'];

        const objm = new ESObjectsManager(ESOlViewer, ESCesiumViewer, ESUeViewer);
        console.log(objm);
        const option = {
            type: "ESOlViewer",
            container: 'container'
        }
        const viewer = objm.createViewer(option);
        const obj = objm.createSceneObject('ESXYZLayer');
        obj.url = "http://t4.tianditu.com/DataServer?T=vec_w&x={x}&y={y}&l={z}&tk=abd187e1140259634e44eea628b65e00"

    </script>
</body>

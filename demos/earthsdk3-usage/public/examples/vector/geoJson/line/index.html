<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <script src="./js/earthsdk.js"></script>
    <script src="./js/Colorpicker.js"></script>
    <!-- 自定义Css样式 -->
    <link rel="stylesheet" href="./css/example1.css" />
    <title>GeoJSON</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="panel">
        <div class="box">
            <button onclick="flyTo()">飞行定位</button>
        </div>
    </div>
    <script>
        /** ---------------------------------地球创建------------------------------------**/
        // Vue中引入方式：import { ESObjectsManager } from 'earthsdk3';
        const { ESObjectsManager } = window['earthsdk3']
        const { ESCesiumViewer } = window['earthsdk3-cesium']
        const { ESUeViewer } = window['earthsdk3-ue']
        const objm = new ESObjectsManager(ESCesiumViewer, ESUeViewer);
        window.g_objm = objm;
        // 监听视口状态
        objm.viewerCreatedEvent.don((viewer) => {
            viewer.flyIn(
                [
                    107.61167263220112,
                    24.852302923577685,
                    717972.5910686029
                ],
                [
                    359.9999999999999,
                    -50.5600829628006,
                    1.9846661212332344e-12
                ],
                3
            )
            // 监听clickEvent鼠标事件
            viewer.clickEvent.don((e) => {
                // pick拾取
                viewer.pick(e.screenPosition, "customPick").then((res) => {
                    console.log('pickedEvent', res)
                });
            });
        });
        // 创建Cesium视口
        const viewer = objm.createCesiumViewer(document.getElementById("app"));

        // 通过json创建一个影像图层
        const imageryLayer = objm.createSceneObjectFromJson({
            id: "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
            type: "ESImageryLayer",
            url: "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        });

        /** ---------------------------------ESGeoJson------------------------------------**/
        let data = {
            "type": "FeatureCollection",
            "name": "xxxxx",
            "crs": {
                "type": "name",
                "properties": {
                    "name": "urn:ogc:def:crs:OGC:1.3:CRS84"
                }
            },
            "features": [
                { "type": "Feature", "properties": { "desc_": "xxxxx" }, "geometry": { "type": "MultiLineString", "coordinates": [[[105.6005859375, 30.65681556429287], [107.95166015624999, 31.98944183792288], [109.3798828125, 30.031055426540206], [107.7978515625, 29.935895213372444]]] } },
                { "type": "Feature", "properties": { "desc_": "xxxxx" }, "geometry": { "type": "MultiLineString", "coordinates": [[[109.3798828125, 30.031055426540206], [107.1978515625, 31.235895213372444]]] } }
            ]
        }

        const sceneObject = objm.createSceneObject('ESGeoJson');
        sceneObject.allowPicking = true

        // url可以填写服务地址，也可以填写具体的data数据（如上所示）
        sceneObject.url = data
        // 额外存储属性
        sceneObject.extras = data
        // 线贴地
        sceneObject.strokeGround = true
        // 线尺寸大小
        sceneObject.strokeWidth = 5
        // 被拾取
        sceneObject.pickedEvent.don((e) => {
            console.log('pickedEvent', e.pickedInfo.geojsonPickInfo)
            alert(JSON.stringify(e.pickedInfo.geojsonPickInfo))

        })

        // 飞行定位
        const flyTo = () => {
            sceneObject.flyTo();
        };
    </script>
    <!-- 切换UE和Cesium引擎的组件（Vue） -->
    <div id="root">
        <switch-engine :objm="objm"></switch-engine>
    </div>
    <!-- Vue文件 -->
    <script src="./js/vue.global.js"></script>
    <!-- 切换UE和Cesium的组件 -->
    <script src="./js/switchEngineCom.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <script src="./js/earthsdk.js"></script>
    <!-- 自定义Css样式 -->
    <link rel="stylesheet" href="./css/example1.css" />
    <script src="./js/Colorpicker.js"></script>

    <title>feature等值条件着色</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="panel">
        <button onclick="setFeatureStyle()">样式着色</button>
        <button onclick="resetFeatureStyle()">恢复原始</button>
    </div>
    <script>
        /** ---------------------------------地球创建------------------------------------**/
        // Vue中引入方式：import { ESObjectsManager } from 'earthsdk3';
        const { ESObjectsManager } = window['earthsdk3']
        const { ESCesiumViewer } = window['earthsdk3-cesium']
        const { ESUeViewer } = window['earthsdk3-ue']
        const objm = new ESObjectsManager(ESCesiumViewer, ESUeViewer);
        window.g_objm = objm;
        // 监听视口状态
        objm.viewerCreatedEvent.don((viewer) => {
            viewer.flyIn([116.39193482449402, 39.906399291545384, 54.28013086155778], [324.55877082508925, -36.824132668310035, 359.999935971016], 2);
        });
        // 创建Cesium视口
        const viewer = objm.createCesiumViewer(document.getElementById("app"));

        // 通过json创建一个影像图层
        const imageryLayer = objm.createSceneObjectFromJson({
            id: "9812a65f-0de0-4f7b-b234-809c0c2fb8ef",
            type: "ESImageryLayer",
            url: "https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        });

        // 创建ES3DTileset对象
        const es3DTileset = objm.createSceneObject('ES3DTileset');
        // url服务地址
        es3DTileset.url = "https://www.pipeser.com/cesiumlab/jgYgbe3y/tileset.json";
        // 加载完成
        // es3DTileset.tilesetReady.don((tileset) => {
        //     console.log(tileset);
        // })
        window.es3DTileset = es3DTileset;


        function setFeatureStyle() {

            const json = [
                {
                    "condition": [
                        {
                            "field": "面积",
                            "op": ">",
                            "value": 5
                        }
                    ],
                    "color": [
                        1,
                        0,
                        0,
                        1
                    ],
                    "show": false
                },
                {
                    "condition": [
                        {
                            "field": "类别",
                            "op": "==",
                            "value": "幕墙嵌板"
                        }
                    ],
                    "color": [
                        1,
                        0,
                        0,
                        1
                    ],
                    "show": true
                }
            ]
            // op:string类型，操作符(目前字符串属性支持：==  !=  contain empty; 数字属性支持：== != > >= < <=）
            es3DTileset.setFeatureStyle(json);
        };

        // 恢复原始
        function resetFeatureStyle() {
            es3DTileset.resetFeatureStyle();
        }


    </script>

    <!-- 切换UE和Cesium引擎的组件（Vue） -->
    <div id="root">
        <switch-engine :objm="objm"></switch-engine>
    </div>
    <!-- Vue文件 -->
    <script src="./js/vue.global.js"></script>
    <!-- 切换UE和Cesium的组件 -->
    <script src="./js/switchEngineCom.js"></script>
</body>

</html>
